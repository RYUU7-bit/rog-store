services:
  - type: web
    name: rog-store
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: "ROG Store"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://rog-store.onrender.com
      - key: LOG_LEVEL
        value: error
      - key: BAKONG_API_URL
        value: https://api-bakong.nbc.gov.kh
      - key: BAKONG_ACCOUNT_ID
        sync: false
      - key: BAKONG_MERCHANT_NAME
        sync: false
      - key: BAKONG_MERCHANT_CITY
        sync: false
      - key: BAKONG_TOKEN
        sync: false
